# nginx reverse proxy in front of the mempool backend.
# - terminates TLS (certs from certbot)
# - forwards /api and /api/v1/ws to mempool-api:8999
# - upgrades WS connections properly
#
# $DOMAIN is substituted at container start via envsubst.

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ---------- Edge micro-cache ----------
  # Collapses bursts of identical polls (tip height, supply) into a single
  # upstream call. `use_temp_path=off` avoids a cross-filesystem move on
  # cache write. `proxy_cache_lock on` in each location makes concurrent
  # cache misses share ONE upstream fetch instead of stampeding.
  proxy_cache_path /var/cache/nginx/txc levels=1:2
                   keys_zone=txc_cache:10m
                   max_size=100m
                   inactive=10m
                   use_temp_path=off;
  proxy_cache_key "$scheme$request_method$host$request_uri";

  # ---------- HTTP → HTTPS + ACME challenge ----------
  server {
    listen 80;
    server_name $DOMAIN;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ---------- HTTPS ----------
  server {
    listen 443 ssl http2;
    server_name $DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # CORS — the explorer frontend lives on a different origin.
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # WebSocket — must come before the /api block.
    location /api/v1/ws {
      proxy_pass http://mempool-api:8999/api/v1/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }


    # ---------- Hot-path micro-cache ----------
    # These two endpoints get polled in tight loops (once every ~2s for the
    # tip height by every explorer client; once every ~2s for supply by an
    # internal Node script). Exact-match `=` beats regex, so these win over
    # the generic address/blocks handlers below.
    #
    # `proxy_cache_lock on` = only ONE upstream request per key while others
    # wait for it to fill the cache — the burst-collapse behaviour we want.
    # `use_stale updating` = keep serving the last good body during refresh.

    # Tip height — changes at most once per block (~3 min). 2s TTL is enough
    # to collapse every browser's polling loop into one upstream call.
    location = /api/v1/blocks/tip/height {
      proxy_pass http://indexer:3001/blocks/tip/height;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache            txc_cache;
      proxy_cache_valid 200  2s;
      proxy_cache_lock       on;
      proxy_cache_use_stale  updating error timeout;
      add_header X-Cache-Status $upstream_cache_status always;
    }
    location = /api/blocks/tip/height {
      proxy_pass http://indexer:3001/blocks/tip/height;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache            txc_cache;
      proxy_cache_valid 200  2s;
      proxy_cache_lock       on;
      proxy_cache_use_stale  updating error timeout;
      add_header X-Cache-Status $upstream_cache_status always;
    }

    # Supply — expensive (walks UTXO set), rarely changes. 30s TTL.
    location = /api/v1/address/_supply {
      proxy_pass http://indexer:3001/address/_supply;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache            txc_cache;
      proxy_cache_valid 200  30s;
      proxy_cache_lock       on;
      proxy_cache_use_stale  updating error timeout;
      add_header X-Cache-Status $upstream_cache_status always;
    }
    location = /api/address/_supply {
      proxy_pass http://indexer:3001/address/_supply;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache            txc_cache;
      proxy_cache_valid 200  30s;
      proxy_cache_lock       on;
      proxy_cache_use_stale  updating error timeout;
      add_header X-Cache-Status $upstream_cache_status always;
    }

    # Address endpoints — served by our custom indexer, not mempool-api.
    # Matches /api/address/..., /api/v1/address/..., and also the bare
    # Esplora-style /address/... used by some tooling.
    location ~ ^/api/(?:v1/)?address/(.*)$ {
      proxy_pass http://indexer:3001/address/$1$is_args$args;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache_valid 200 5s;
    }

    # Esplora REST — blocks, tx reads, mempool, fee-estimates — all served by
    # our indexer (mempool-api in MEMPOOL_BACKEND=none mode doesn't expose them).
    # Matches both bare /api/<x> and /api/v1/<x> for client compatibility.
    location ~ ^/api/(?:v1/)?(blocks|block|block-height|mempool|fee-estimates)(/.*)?$ {
      proxy_pass http://indexer:3001/$1$2$is_args$args;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache_valid 200 5s;
    }

    # Read-only tx endpoints (full tx, status, outspends) — also our indexer.
    # POST /tx and /tx/:txid/hex have their own exact-match blocks below.
    location ~ ^/api/(?:v1/)?tx/([0-9a-fA-F]{64})(/(?:status|outspends|merkle-proof|merkleblock-proof))?$ {
      proxy_pass http://indexer:3001/tx/$1$2$is_args$args;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache_valid 200 5s;
    }

    # Broadcast (POST raw hex) — goes to our indexer, which talks to texitcoind
    # via JSON-RPC sendrawtransaction. mempool-api in MEMPOOL_BACKEND=none mode
    # doesn't accept POST /tx, so we own it here.
    # Same as above but under /api/v1/ — the swap project (and most
    # Esplora clients now) use this prefix.
    location = /api/v1/tx {
      proxy_pass http://indexer:3001/tx;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location ~ ^/api/v1/tx/([0-9a-fA-F]{64})/hex$ {
      proxy_pass http://indexer:3001/tx/$1/hex;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache_valid 200 30s;
    }

    location = /api/tx {
      proxy_pass http://indexer:3001/tx;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Raw tx hex — used by signers to fetch prevout scripts.
    location ~ ^/api/tx/([0-9a-fA-F]{64})/hex$ {
      proxy_pass http://indexer:3001/tx/$1/hex;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache_valid 200 30s;
    }


    # REST — everything else under /api/ goes to mempool-api.
    location /api/ {
      proxy_pass http://mempool-api:8999/api/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;

      # tiny edge cache for the heavy/rarely-changing endpoints
      proxy_cache_valid 200 5s;
    }

    # Root — point to the Lovable-published frontend, or serve a redirect.
    location / {
      return 302 https://mempool-heart-explorer.lovable.app/;
    }
  }
}
