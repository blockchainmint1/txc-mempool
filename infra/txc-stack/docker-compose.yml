# TXC explorer backend. Node (texitcoind) runs on the HOST via node-spinner.
# Frontend points at https://${DOMAIN}/api + wss://${DOMAIN}/api/v1/ws.
#
# NOTE: electrs has been removed. Stock romanz/electrs only supports Bitcoin
# mainnet magic bytes / genesis hash, so it cannot index TexitCoin. The mempool
# backend runs in bitcoind-only mode (MEMPOOL_BACKEND=none) and talks to the
# host texitcoind via JSON-RPC. Address-level indexing will require a
# TexitCoin-patched electrs/esplora later.

services:
  mempool-db:
    image: mariadb:11
    container_name: txc-mempool-db
    restart: unless-stopped
    networks:
      default:
        aliases:
          - db
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data/mempool-db:/var/lib/mysql
    expose:
      - "3306"

  mempool-api:
    image: mempool/backend:latest
    container_name: txc-mempool-api
    restart: unless-stopped
    depends_on:
      - mempool-db
    user: "1000:1000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MEMPOOL_BACKEND: "none"
      MEMPOOL_NETWORK: "mainnet"
      MEMPOOL_INDEXING_BLOCKS_AMOUNT: "-1"
      CORE_RPC_HOST: "host.docker.internal"
      CORE_RPC_PORT: "${RPC_PORT}"
      CORE_RPC_USERNAME: "${RPC_USER}"
      CORE_RPC_PASSWORD: "${RPC_PASSWORD}"
      CORE_RPC_TIMEOUT: "60000"
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "mempool-db"
      DATABASE_PORT: "3306"
      DATABASE_DATABASE: "${MYSQL_DATABASE}"
      DATABASE_USERNAME: "${MYSQL_USER}"
      DATABASE_PASSWORD: "${MYSQL_PASSWORD}"
      STATISTICS_ENABLED: "true"
    volumes:
      - ./data/mempool-cache:/backend/cache
    expose:
      - "8999"

  nginx:
    image: nginx:alpine
    container_name: txc-nginx
    restart: unless-stopped
    depends_on:
      - mempool-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN}
    command: >
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf > /tmp/nginx.conf
      && exec nginx -c /tmp/nginx.conf -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    container_name: txc-certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!}; done"
