# texitcoind config — minimal, tuned for serving an indexer + mempool backend.
# RPC creds come from the container env (overridden by docker-compose).

server=1
daemon=0
listen=1
txindex=1
blockfilterindex=1
peerbloomfilters=1

# RPC — only reachable inside the docker network.
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcworkqueue=128
rpcthreads=16

# ZMQ — mempool/backend will subscribe for instant tx/block events.
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28333
zmqpubhashblock=tcp://0.0.0.0:28334

# Mempool — keep generous so the explorer has plenty to show.
maxmempool=600
mempoolexpiry=336
maxconnections=80

# Logs
debug=0
shrinkdebugfile=1
