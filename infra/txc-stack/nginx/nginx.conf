# nginx reverse proxy in front of the mempool backend.
# - terminates TLS (certs from certbot)
# - forwards /api and /api/v1/ws to mempool-api:8999
# - upgrades WS connections properly
#
# $DOMAIN is substituted at container start via envsubst.

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ---------- HTTP → HTTPS + ACME challenge ----------
  server {
    listen 80;
    server_name $DOMAIN;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ---------- HTTPS ----------
  server {
    listen 443 ssl http2;
    server_name $DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # CORS — the explorer frontend lives on a different origin.
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # WebSocket — must come before the /api block.
    location /api/v1/ws {
      proxy_pass http://mempool-api:8999/api/v1/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Address endpoints — served by our custom indexer, not mempool-api.
    # Matches /api/address/..., /api/v1/address/..., and also the bare
    # Esplora-style /address/... used by some tooling.
    location ~ ^/api/(?:v1/)?address/(.*)$ {
      proxy_pass http://indexer:3001/address/$1$is_args$args;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_cache_valid 200 5s;
    }

    # REST — everything else under /api/ goes to mempool-api.
    location /api/ {
      proxy_pass http://mempool-api:8999/api/;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;

      # tiny edge cache for the heavy/rarely-changing endpoints
      proxy_cache_valid 200 5s;
    }

    # Root — point to the Lovable-published frontend, or serve a redirect.
    location / {
      return 302 https://mempool-heart-explorer.lovable.app/;
    }
  }
}
